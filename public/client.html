window.__emailDrawerClose = closeEmailDrawer;

function drawEmailDrawer() {
  var email = emailState.currentEmail;
  if (!email) return;

  var bodyHTML = '';

  // Quality issues warning (if any)
  if (email.qualityIssues) {
    bodyHTML += '<div class="email-quality-warning">';
    bodyHTML += '<strong>⚠ Quality issues</strong>';
    bodyHTML += esc(email.qualityIssues);
    bodyHTML += '</div>';
  }

  // Metadata grid
  bodyHTML += '<div class="email-drawer-meta-grid">';
  bodyHTML += '<div class="email-drawer-section"><div class="email-drawer-label">Status</div><div class="email-drawer-value"><span class="email-row-status email-status-' + (email.status || 'draft').toLowerCase().replace(/\s+/g, '-') + '">' + esc(email.status) + '</span></div></div>';
  bodyHTML += '<div class="email-drawer-section"><div class="email-drawer-label">Audience</div><div class="email-drawer-value">' + esc(email.audience || '—') + '</div></div>';
  bodyHTML += '<div class="email-drawer-section"><div class="email-drawer-label">Recipient</div><div class="email-drawer-value">' + esc(email.recipientEmail || email.audienceSegment || '—') + '</div></div>';
  bodyHTML += '<div class="email-drawer-section"><div class="email-drawer-label">Recipients</div><div class="email-drawer-value">' + (email.recipientsCount || 0) + '</div></div>';
  if (email.scheduledSend) {
    bodyHTML += '<div class="email-drawer-section"><div class="email-drawer-label">Scheduled</div><div class="email-drawer-value">' + esc(formatDate(email.scheduledSend)) + '</div></div>';
  }
  if (email.sentAt) {
    bodyHTML += '<div class="email-drawer-section"><div class="email-drawer-label">Sent</div><div class="email-drawer-value">' + esc(formatDate(email.sentAt)) + '</div></div>';
  }
  if (email.opens || email.clicks) {
    bodyHTML += '<div class="email-drawer-section"><div class="email-drawer-label">Opens</div><div class="email-drawer-value">' + (email.opens || 0) + '</div></div>';
    bodyHTML += '<div class="email-drawer-section"><div class="email-drawer-label">Clicks</div><div class="email-drawer-value">' + (email.clicks || 0) + '</div></div>';
  }
  bodyHTML += '</div>';

  // Subject and preview text
  if (emailState.editing) {
    bodyHTML += '<div class="email-drawer-section"><div class="email-drawer-label">Subject</div>';
    bodyHTML += '<input type="text" id="emailEditSubject" value="' + esc(email.subject) + '" style="width:100%;padding:var(--space-2);border:1px solid var(--tg-border);border-radius:var(--radius-md);font-family:var(--tg-font-body);font-size:var(--text-sm)" /></div>';
    bodyHTML += '<div class="email-drawer-section"><div class="email-drawer-label">Preview text</div>';
    bodyHTML += '<input type="text" id="emailEditPreview" value="' + esc(email.previewText) + '" style="width:100%;padding:var(--space-2);border:1px solid var(--tg-border);border-radius:var(--radius-md);font-family:var(--tg-font-body);font-size:var(--text-sm)" /></div>';
    bodyHTML += '<div class="email-drawer-section"><div class="email-drawer-label">Body (plain text)</div>';
    bodyHTML += '<textarea id="emailEditPlain" rows="10" style="width:100%;padding:var(--space-2);border:1px solid var(--tg-border);border-radius:var(--radius-md);font-family:var(--tg-font-mono);font-size:var(--text-xs);resize:vertical">' + esc(email.bodyPlain) + '</textarea></div>';
  } else {
    bodyHTML += '<div class="email-drawer-section"><div class="email-drawer-label">Subject</div><div class="email-drawer-value" style="font-weight:600;font-size:var(--text-base)">' + esc(email.subject) + '</div></div>';
    if (email.previewText) {
      bodyHTML += '<div class="email-drawer-section"><div class="email-drawer-label">Preview text</div><div class="email-drawer-value" style="color:var(--tg-text-secondary);font-style:italic">' + esc(email.previewText) + '</div></div>';
    }

    // HTML/plain toggle and preview
    bodyHTML += '<div class="email-drawer-section">';
    bodyHTML += '<div class="email-drawer-label">Body</div>';
    bodyHTML += '<div class="email-preview-toggle">';
    bodyHTML += '<button class="' + (emailState.previewMode === 'html' ? 'active' : '') + '" onclick="window.__emailPreview(\'html\')">HTML</button>';
    bodyHTML += '<button class="' + (emailState.previewMode === 'plain' ? 'active' : '') + '" onclick="window.__emailPreview(\'plain\')">Plain text</button>';
    bodyHTML += '</div>';
    if (emailState.previewMode === 'html') {
      bodyHTML += '<div class="email-preview-frame">' + (email.bodyHTML || '<em style="color:#999">No HTML body</em>') + '</div>';
    } else {
      bodyHTML += '<div class="email-preview-frame plain">' + esc(email.bodyPlain || '(no plain text fallback)') + '</div>';
    }
    bodyHTML += '</div>';
  }

  // Audit trail
  if (emailState.auditTrail && emailState.auditTrail.length > 0) {
    bodyHTML += '<div class="email-drawer-section">';
    bodyHTML += '<div class="email-drawer-label">History</div>';
    bodyHTML += '<div class="email-audit-list">';
    for (var i = 0; i < emailState.auditTrail.length; i++) {
      var a = emailState.auditTrail[i];
      bodyHTML += '<div class="email-audit-item">';
      bodyHTML += '<span class="email-audit-action">' + esc(a.action) + '</span>';
      bodyHTML += esc(a.actor) + ' ';
      bodyHTML += '<span class="email-audit-meta">' + esc(formatDate(a.timestamp)) + '</span>';
      bodyHTML += '</div>';
    }
    bodyHTML += '</div>';
    bodyHTML += '</div>';
  }

  // Action buttons (sticky bottom)
  var canApprove = ['Awaiting Approval', 'Draft', 'Quality Hold'].indexOf(email.status) !== -1;
  var canCancel = email.status === 'Approved';
  var canEdit = email.status !== 'Sent';

  if (emailState.editing) {
    bodyHTML += '<div class="email-actions">';
    bodyHTML += '<button class="email-action-edit" onclick="window.__emailCancelEdit()">Cancel</button>';
    bodyHTML += '<button class="email-action-approve" onclick="window.__emailSaveEdit()">Save changes</button>';
    bodyHTML += '</div>';
  } else if (canApprove) {
    bodyHTML += '<div class="email-actions">';
    if (canEdit) bodyHTML += '<button class="email-action-edit" onclick="window.__emailEdit()">Edit</button>';
    bodyHTML += '<button class="email-action-reject" onclick="window.__emailReject()">Reject</button>';
    bodyHTML += '<button class="email-action-approve" onclick="window.__emailApprove()">Approve</button>';
    bodyHTML += '</div>';
  } else if (canCancel) {
    bodyHTML += '<div class="email-actions">';
    bodyHTML += '<button class="email-action-reject" onclick="window.__emailCancel()">Cancel send</button>';
    bodyHTML += '</div>';
  }

  $('emailDrawerBody').innerHTML = bodyHTML;
}

window.__emailPreview = function(mode) {
  emailState.previewMode = mode;
  drawEmailDrawer();
};

window.__emailEdit = function() {
  emailState.editing = true;
  drawEmailDrawer();
};

window.__emailCancelEdit = function() {
  emailState.editing = false;
  drawEmailDrawer();
};

window.__emailSaveEdit = async function() {
  var subject = $('emailEditSubject').value.trim();
  var previewText = $('emailEditPreview').value.trim();
  var bodyPlain = $('emailEditPlain').value;

  if (!subject) { alert('Subject cannot be empty'); return; }

  try {
    var r = await fetch('/api/email-action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        clientId: state.profile.id,
        emailId: emailState.currentEmail.id,
        action: 'edit',
        edits: { subject: subject, previewText: previewText, bodyPlain: bodyPlain },
      }),
    });
    var d = await r.json();
    if (!d.success) throw new Error(d.error || 'Failed to save');
    // Reload the email
    emailState.editing = false;
    window.__emailOpen(emailState.currentEmail.id);
    loadEmails();  // refresh list
  } catch (e) {
    alert('Save failed: ' + e.message);
  }
};

window.__emailApprove = async function() {
  if (!confirm('Approve this email for sending?')) return;
  try {
    var r = await fetch('/api/email-action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        clientId: state.profile.id,
        emailId: emailState.currentEmail.id,
        action: 'approve',
      }),
    });
    var d = await r.json();
    if (!d.success) throw new Error(d.error || 'Approve failed');
    closeEmailDrawer();
    loadEmails();
  } catch (e) {
    alert('Approve failed: ' + e.message);
  }
};

window.__emailReject = async function() {
  var reason = prompt('Why are you rejecting this email? (optional)');
  if (reason === null) return;  // cancelled
  try {
    var r = await fetch('/api/email-action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        clientId: state.profile.id,
        emailId: emailState.currentEmail.id,
        action: 'reject',
        rejectionReason: reason,
      }),
    });
    var d = await r.json();
    if (!d.success) throw new Error(d.error || 'Reject failed');
    closeEmailDrawer();
    loadEmails();
  } catch (e) {
    alert('Reject failed: ' + e.message);
  }
};

window.__emailCancel = async function() {
  if (!confirm('Cancel this approved email? It will not be sent.')) return;
  try {
    var r = await fetch('/api/email-action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        clientId: state.profile.id,
        emailId: emailState.currentEmail.id,
        action: 'cancel',
      }),
    });
    var d = await r.json();
    if (!d.success) throw new Error(d.error || 'Cancel failed');
    closeEmailDrawer();
    loadEmails();
  } catch (e) {
    alert('Cancel failed: ' + e.message);
  }
};

// Extend emailState with compose + audiences

  subject: '',
  previewText: '',
  bodyHTML: '',
  bodyPlain: '',
  audience: 'Client',
  audienceSegment: '',
  recipientEmail: '',
  scheduledSend: '',
  emailType: 'Newsletter',
};
emailState.audiences = null;
emailState.audiencesLoading = false;

// Override the original drawEmails to include Compose button and Audiences sub-tab
var __originalDrawEmails = drawEmails;
drawEmails = function() {
  var el = $('view-emails');
  if (!el) return;

  // If compose is open, render compose view instead
  if (emailState.composeOpen) {
    drawComposeForm();
    return;
  }

  // If audiences sub-tab is active, render audiences view
  if (emailState.currentSubTab === 'audiences') {
    drawAudiencesView();
    return;
  }

  // Otherwise call original draw (Queue / Sent)
  __originalDrawEmails();

  // Now inject the Compose button and Audiences sub-tab into the rendered output
  injectDayBControls();
};

// Expose drawEmails to inline onclick handlers (since drawEmails is IIFE-scoped)
window.__emailRedraw = function() { drawEmails(); };

function injectDayBControls() {
  // Add Compose button to top of view (before sub-tabs)
  var subtabsRow = document.querySelector('#view-emails .email-subtabs');
  if (!subtabsRow) return;

  // Add Audiences sub-tab if not already there
  if (!subtabsRow.querySelector('[data-subtab="audiences"]')) {
    var audSubtab = document.createElement('button');
    audSubtab.className = 'email-subtab' + (emailState.currentSubTab === 'audiences' ? ' active' : '');
    audSubtab.setAttribute('data-subtab', 'audiences');
    audSubtab.textContent = 'Audiences';
    audSubtab.onclick = function() { window.__emailSubTab('audiences'); };
    subtabsRow.appendChild(audSubtab);
  }

  // Add Compose button positioned absolute to top-right of subtabs row
  if (!document.querySelector('#emailComposeBtn')) {
    var composeBtn = document.createElement('button');
    composeBtn.id = 'emailComposeBtn';
    composeBtn.style.cssText = 'margin-left:auto;display:flex;align-items:center;gap:6px;height:36px;padding:0 16px;border-radius:var(--radius-md);background:var(--tg-accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--tg-font-body);transition:background var(--duration-fast)';
    composeBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg> Compose';
    composeBtn.onclick = function() { window.__emailCompose(); };
    composeBtn.onmouseenter = function() { this.style.background = 'var(--tg-accent-dark)'; };
    composeBtn.onmouseleave = function() { this.style.background = 'var(--tg-accent)'; };
    subtabsRow.style.alignItems = 'center';
    subtabsRow.appendChild(composeBtn);
  }
}

window.__emailCompose = function() {
  emailState.composeOpen = true;
  // Reset to defaults but preserve any in-progress data
  drawEmails();
};

window.__emailComposeClose = function() {
  if (hasComposeContent() && !confirm('Discard this email? All unsaved content will be lost.')) {
    return;
  }
  emailState.composeOpen = false;
  emailState.composeData = {
    subject: '',
    previewText: '',
    bodyHTML: '',
    bodyPlain: '',
    audience: 'Client',
    audienceSegment: '',
    recipientEmail: '',
    scheduledSend: '',
    emailType: 'Newsletter',
  };
  drawEmails();
};

function hasComposeContent() {
  var d = emailState.composeData;
  return !!(d.subject || d.previewText || d.bodyHTML || d.bodyPlain || d.recipientEmail);
}

    h += '<textarea id="composeHTML" rows="20" placeholder="<p>Your HTML email body...</p>" style="width:100%;padding:12px;border:1px solid var(--tg-border);border-radius:var(--radius-md);font-family:var(--tg-font-mono);font-size:12px;background:var(--tg-bg-primary);color:var(--tg-text-primary);resize:vertical;line-height:1.5" oninput="window.__composeUpdate(\'bodyHTML\',this.value)">' + esc(d.bodyHTML) + '</textarea>';
  } else if (mode === 'plain') {
    h += '<textarea id="composePlain" rows="20" placeholder="Plain-text version of the email (recommended for accessibility)" style="width:100%;padding:12px;border:1px solid var(--tg-border);border-radius:var(--radius-md);font-family:var(--tg-font-mono);font-size:12px;background:var(--tg-bg-primary);color:var(--tg-text-primary);resize:vertical;line-height:1.5" oninput="window.__composeUpdate(\'bodyPlain\',this.value)">' + esc(d.bodyPlain) + '</textarea>';
  } else {
    h += '<div style="border:1px solid var(--tg-border);border-radius:var(--radius-md);padding:16px;background:#fff;min-height:400px;max-height:600px;overflow-y:auto">' + (d.bodyHTML || '<em style="color:#999">Nothing to preview yet</em>') + '</div>';
  }
  h += '</div>'; // end body card
  h += '</div>'; // end right column

  h += '</div>'; // end grid

  el.innerHTML = h;
}

window.__composeUpdate = function(key, value) {
  emailState.composeData[key] = value;
};

window.__composeBodyMode = function(mode) {
  // Save current textarea content before switching
  var d = emailState.composeData;
  if ($('composeHTML')) d.bodyHTML = $('composeHTML').value;
  if ($('composePlain')) d.bodyPlain = $('composePlain').value;
  emailState.composeBodyMode = mode;
  drawEmails();
};

window.__emailComposeSave = async function() {
  // Pull latest values from textareas (in case user typed without onclick triggering)
  var d = emailState.composeData;
  if ($('composeHTML')) d.bodyHTML = $('composeHTML').value;
  if ($('composePlain')) d.bodyPlain = $('composePlain').value;
  if ($('composeSubject')) d.subject = $('composeSubject').value;
  if ($('composePreview')) d.previewText = $('composePreview').value;
  if ($('composeRecipient')) d.recipientEmail = $('composeRecipient').value;
  if ($('composeSegment')) d.audienceSegment = $('composeSegment').value;

  // Validate
  if (!d.subject.trim()) { alert('Subject is required'); return; }
  if (!d.bodyHTML.trim() && !d.bodyPlain.trim()) { alert('Body (HTML or plain text) is required'); return; }
  if (!d.audience) { alert('Pick an audience'); return; }
  if (d.recipientEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(d.recipientEmail)) {
    alert('Recipient email is not valid'); return;
  }

  var btn = $('composeSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; btn.style.opacity = '0.6'; }

  try {
    var r = await fetch('/api/email-compose', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(Object.assign({ clientId: state.profile.id }, d)),
    });
    var data = await r.json();
    if (!data.success) throw new Error(data.error || 'Save failed');

    showEmailToast('Email saved as Awaiting Approval', 'success');
    emailState.composeOpen = false;
    emailState.composeData = {
      subject: '', previewText: '', bodyHTML: '', bodyPlain: '',
      audience: 'Client', audienceSegment: '', recipientEmail: '',
      scheduledSend: '', emailType: 'Newsletter',
    };
    loadEmails();  // refresh queue
  } catch (e) {
    alert('Save failed: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = 'Save as Draft'; btn.style.opacity = '1'; }
  }
};

// ── AUDIENCES VIEW ──

async function drawAudiencesView() {
  var el = $('view-emails');
  var h = '';

  // Sub-tabs row (replicate from Day A)
  h += '<div class="email-subtabs" style="align-items:center">';
  h += '<button class="email-subtab" onclick="window.__emailSubTab(\'queue\')">Queue</button>';
  h += '<button class="email-subtab" onclick="window.__emailSubTab(\'sent\')">Sent</button>';
  h += '<button class="email-subtab active" data-subtab="audiences">Audiences</button>';
  h += '<button id="emailComposeBtn" onclick="window.__emailCompose()" style="margin-left:auto;display:flex;align-items:center;gap:6px;height:36px;padding:0 16px;border-radius:var(--radius-md);background:var(--tg-accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--tg-font-body)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg> Compose</button>';
  h += '</div>';

  // Description
  h += '<div style="background:linear-gradient(135deg,rgba(0,180,216,0.06),rgba(27,43,91,0.04));border:1px solid rgba(0,180,216,0.15);border-radius:var(--radius-md);padding:16px 20px;margin-bottom:var(--space-4)">';
  h += '<div style="font-size:13px;color:var(--tg-text-secondary);line-height:1.6">';
  h += '<strong style="color:var(--tg-text-primary)">Brevo audiences</strong> are your contact lists. Each list maps to one of our four audience types: Cold (cold prospects), Nurture (inbound leads), Client (paying customers), and Drip (sequence pipeline). Counts update from Brevo on load.';
  h += '</div></div>';

  if (emailState.audiences === null) {
    h += '<div style="text-align:center;padding:40px;color:var(--tg-text-tertiary)">Loading audiences from Brevo...</div>';
    el.innerHTML = h;
    await loadAudiences();
    drawAudiencesView();
    return;
  }

  if (!emailState.audiences.length) {
    h += '<div style="text-align:center;padding:40px;color:var(--tg-text-tertiary)">No audiences configured.</div>';
    el.innerHTML = h;
    return;
  }

  // Render audience cards
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--space-3)">';
  emailState.audiences.forEach(function(a) {
    h += '<div style="background:var(--tg-bg-primary);border:1px solid var(--tg-border);border-radius:var(--radius-md);padding:18px;transition:box-shadow var(--duration-fast)">';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
    h += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--tg-accent-dark);font-family:var(--tg-font-mono)">' + esc(a.audienceMapping || '—') + '</div>';
    if (!a.configured) {
      h += '<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:rgba(245,158,11,0.1);color:var(--tg-warning)">NOT CONFIGURED</span>';
    } else if (a.error) {
      h += '<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:rgba(239,68,68,0.1);color:var(--tg-error)">ERROR</span>';
    } else {
      h += '<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:rgba(16,185,129,0.1);color:var(--tg-success)">LIVE</span>';
    }
    h += '</div>';
    h += '<div style="font-size:16px;font-weight:700;color:var(--tg-text-primary);margin-bottom:4px">' + esc(a.listName || a.label) + '</div>';
    h += '<div style="font-size:11px;color:var(--tg-text-tertiary);font-family:var(--tg-font-mono);margin-bottom:14px">' + esc(a.label) + (a.listId ? ' &middot; List ' + esc(a.listId) : '') + '</div>';

    if (a.configured && !a.error) {
      h += '<div style="display:flex;gap:16px;padding-top:12px;border-top:1px solid var(--tg-border)">';
      h += '<div><div style="font-size:10px;font-weight:700;color:var(--tg-text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px">Subscribers</div><div style="font-size:20px;font-weight:700;color:var(--tg-text-primary);font-variant-numeric:tabular-nums">' + (a.totalSubscribers || 0) + '</div></div>';
      if (a.totalBlacklisted) {
        h += '<div><div style="font-size:10px;font-weight:700;color:var(--tg-text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px">Blocklisted</div><div style="font-size:20px;font-weight:700;color:var(--tg-text-tertiary);font-variant-numeric:tabular-nums">' + a.totalBlacklisted + '</div></div>';
      }
      h += '</div>';
    } else {
      h += '<div style="font-size:11px;color:var(--tg-text-tertiary);padding-top:12px;border-top:1px solid var(--tg-border)">' + esc(a.error || 'Brevo list ID env var not set') + '</div>';
    }
    h += '</div>';
  });
  h += '</div>';

  el.innerHTML = h;
}

async function loadAudiences() {
  if (!state.profile || !state.profile.id) return;
  emailState.audiencesLoading = true;
  try {
    var r = await fetch('/api/audiences?clientId=' + encodeURIComponent(state.profile.id));
    var d = await r.json();
    if (!d.success) throw new Error(d.error || 'Failed to load');
    emailState.audiences = d.audiences || [];
  } catch (e) {
    emailState.audiences = [];
    console.error('Audiences load error:', e);
  } finally {
    emailState.audiencesLoading = false;
  }
}

// ── SEND NOW BUTTON (extends drawEmailDrawer) ──

var __originalDrawEmailDrawer = drawEmailDrawer;
drawEmailDrawer = function() {
  // Run original
  __originalDrawEmailDrawer();

  // Now inject Send Now button if email is Approved + has a recipient
  var email = emailState.currentEmail;
  if (!email) return;

  var isApproved = email.status === 'Approved';
  var hasRecipient = email.recipientEmail && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.recipientEmail);

  if (!isApproved || !hasRecipient) return;

  var actionsRow = document.querySelector('.email-actions');
  if (!actionsRow || actionsRow.querySelector('.email-action-send-now')) return;

  var btn = document.createElement('button');
  btn.className = 'email-action-approve email-action-send-now';
  btn.style.cssText = 'background:var(--tg-accent);border-color:var(--tg-accent)';
  btn.innerHTML = 'Send Now';
  btn.onclick = function() { window.__emailSendNow(); };

  // Replace existing buttons (they'll be Cancel send only) with Send Now + Cancel
  actionsRow.innerHTML = '';
  var cancelBtn = document.createElement('button');
  cancelBtn.className = 'email-action-reject';
  cancelBtn.textContent = 'Cancel send';
  cancelBtn.onclick = function() { window.__emailCancel(); };
  actionsRow.appendChild(cancelBtn);
  actionsRow.appendChild(btn);
};

window.__emailSendNow = async function() {
  var email = emailState.currentEmail;
  if (!email) return;
  if (!confirm('Send "' + email.subject + '" to ' + email.recipientEmail + ' right now? This cannot be undone.')) return;

  try {
    var r = await fetch('/api/email-send-now', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        clientId: state.profile.id,
        emailId: email.id,
      }),
    });
    var d = await r.json();
    if (!d.success) throw new Error(d.error || 'Send failed');
    showEmailToast('Sent to ' + d.recipient, 'success');
    closeEmailDrawer();
    loadEmails();
  } catch (e) {
    alert('Send failed: ' + e.message);
  }
};

// ── TOAST HELPER ──
function showEmailToast(msg, type) {
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;font-family:var(--tg-font-body);box-shadow:0 8px 24px rgba(0,0,0,0.15);';
  t.style.background = type === 'success' ? '#059669' : type === 'error' ? '#DC2626' : '#475569';
  t.style.color = '#fff';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() {
    t.style.opacity = '0';
    t.style.transition = 'opacity 0.3s';
    setTimeout(function() { t.remove(); }, 300);
  }, 2500);
}

// Override emailSubTab to handle audiences
var __originalSubTab = window.__emailSubTab;
window.__emailSubTab = function(tab) {
  emailState.currentSubTab = tab;
  if (tab === 'queue') {
    emailState.currentFilter = 'awaiting';
    loadEmails();
  } else if (tab === 'sent') {
    emailState.currentFilter = 'all';
    loadEmails();
  } else if (tab === 'audiences') {
    drawEmails();
  }
};

// === EMAILS TAB DAY B ADDITIONS END ===


})();
</script>
