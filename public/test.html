<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Marketing - API Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0B1D3A; color: #F8FAFB; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 6px; }
        .subtitle { color: #94A3B8; font-size: 13px; margin-bottom: 30px; }
        .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #94A3B8; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: #F8FAFB; font-size: 14px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #00B4B6; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .checkbox-row input { width: auto; margin: 0; }
        .checkbox-row label { margin: 0; color: #CBD5E1; }
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: linear-gradient(135deg, #00B4B6, #009A9C); color: #F8FAFB; font-size: 15px; font-weight: 600; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: wait; }
        .status { margin-top: 16px; padding: 14px; border-radius: 10px; font-size: 13px; line-height: 1.6; display: none; }
        .status.info { display: block; background: rgba(0,180,182,0.1); border: 1px solid rgba(0,180,182,0.25); color: #00D4D6; }
        .status.error { display: block; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #FCA5A5; }
        .status.success { display: block; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #6EE7B7; }
        .results { margin-top: 20px; display: none; }
        .results.visible { display: block; }
        .post-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 18px; margin-bottom: 12px; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .post-type { padding: 3px 10px; border-radius: 6px; font-size: 11px; background: rgba(0,180,182,0.1); border: 1px solid rgba(0,180,182,0.25); color: #00B4B6; }
        .post-day { font-size: 12px; color: #94A3B8; }
        .post-caption { font-size: 14px; line-height: 1.7; color: #CBD5E1; white-space: pre-wrap; margin-bottom: 12px; }
        .post-meta { font-size: 11px; color: #94A3B8; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 10px; }
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
        .tab { padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: #94A3B8; cursor: pointer; font-size: 12px; }
        .tab.active { border-color: rgba(0,180,182,0.4); background: rgba(0,180,182,0.12); color: #00D4D6; }
        .raw-json { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 16px; font-family: monospace; font-size: 12px; color: #94A3B8; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; margin-top: 12px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Luna Marketing</h1>
        <p class="subtitle">Content Engine API Test</p>

        <div class="card">
            <label>Airtable Client Record ID</label>
            <input type="text" id="clientId" value="reckU3dJPui3OnVBP" placeholder="recXXXXXXXXXXXXXXX">

            <div class="checkbox-row">
                <input type="checkbox" id="dryRun" checked>
                <label for="dryRun">Dry run (generate posts but don't write to Airtable)</label>
            </div>

            <button id="generateBtn" onclick="generate()">Generate This Week's Posts</button>

            <div id="status" class="status"></div>
        </div>

        <div id="results" class="results">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('facebook', this)">Facebook</div>
                <div class="tab" onclick="switchTab('instagram', this)">Instagram</div>
                <div class="tab" onclick="switchTab('linkedin', this)">LinkedIn</div>
                <div class="tab" onclick="switchTab('json', this)">Raw JSON</div>
            </div>

            <div id="postsContainer"></div>
            <div id="rawJson" class="raw-json"></div>
        </div>
    </div>

    <script>
        let postsData = null;
        let currentPlatform = 'facebook';

        async function generate() {
            const clientId = document.getElementById('clientId').value.trim();
            const dryRun = document.getElementById('dryRun').checked;
            const btn = document.getElementById('generateBtn');
            const status = document.getElementById('status');

            if (!clientId) {
                status.className = 'status error';
                status.textContent = 'Please enter a client record ID.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Generating posts... (this takes 15-30 seconds)';
            status.className = 'status info';
            status.textContent = 'Calling Claude API via your Vercel endpoint. Reading client profile from Airtable, generating content, please wait...';
            document.getElementById('results').classList.remove('visible');

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId, dryRun })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'API returned an error');
                }

                postsData = data;

                status.className = 'status success';
                let msg = 'Success! Generated ' + data.posts.length + ' posts for ' + data.client + ' (Week ' + data.week + ').';
                if (dryRun) {
                    msg += ' Dry run mode — posts were NOT written to Airtable.';
                } else {
                    msg += ' ' + data.queued + ' posts queued in Airtable.';
                }
                status.textContent = msg;

                renderPosts('facebook');
                document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);
                document.getElementById('results').classList.add('visible');

            } catch (err) {
                status.className = 'status error';
                status.textContent = 'Error: ' + err.message;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate This Week\'s Posts';
            }
        }

        function switchTab(platform, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentPlatform = platform;

            if (platform === 'json') {
                document.getElementById('postsContainer').style.display = 'none';
                document.getElementById('rawJson').style.display = 'block';
            } else {
                document.getElementById('postsContainer').style.display = 'block';
                document.getElementById('rawJson').style.display = 'none';
                renderPosts(platform);
            }
        }

        function renderPosts(platform) {
            if (!postsData || !postsData.posts) return;
            const container = document.getElementById('postsContainer');
            container.innerHTML = '';

            postsData.posts.forEach(post => {
                const caption = post['caption_' + platform] || post.caption_facebook || '';
                const hashtags = post['hashtags_' + platform] || post.hashtags_facebook || [];
                const words = caption.split(/\s+/).filter(Boolean).length;

                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <span class="post-type">${post.content_type || ''}</span>
                        <span class="post-day">${post.destination || ''} · ${post.suggested_day || ''} ${post.suggested_time || ''}</span>
                    </div>
                    <div class="post-caption">${caption}</div>
                    <div class="post-meta">
                        ${words} words · ${hashtags.length} hashtags · ${hashtags.join(' ')}<br>
                        Image tags: ${(post.image_tags || []).join(' | ')}
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
