<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Marketing — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   LUNA MARKETING ADMIN DASHBOARD
   Design System: DM Sans + Space Mono, Teal accent, Navy/Slate base
   ================================================================ */

/* ── CSS CUSTOM PROPERTIES ── */
:root {
  --font: 'DM Sans', sans-serif;
  --mono: 'Space Mono', monospace;
  --teal: #00B4B6;
  --teal-glow: #00D4D6;
  --teal-dim: #009A9C;
  --red: #EF4444;
  --green: #10B981;
  --amber: #F59E0B;
  --purple: #8B5CF6;
  --pink: #EC4899;
  --blue: #3B82F6;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --transition: 0.25s ease;
}

/* ── DARK THEME (default) ── */
[data-theme="dark"] {
  --bg: #0B1D3A;
  --bg-raised: #132C54;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.07);
  --card: rgba(19,44,84,0.6);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.15);
  --text: #F8FAFB;
  --text-dim: #94A3B8;
  --text-body: #CBD5E1;
  --input-bg: rgba(255,255,255,0.06);
  --input-border: rgba(255,255,255,0.12);
  --shadow: 0 4px 24px rgba(0,0,0,0.35);
  --glow: 0 0 20px rgba(0,180,182,0.08);
}

/* ── LIGHT THEME ── */
[data-theme="light"] {
  --bg: #F1F5F9;
  --bg-raised: #FFFFFF;
  --surface: rgba(0,0,0,0.025);
  --surface-hover: rgba(0,0,0,0.05);
  --card: #FFFFFF;
  --border: rgba(0,0,0,0.07);
  --border-hover: rgba(0,0,0,0.14);
  --text: #0F172A;
  --text-dim: #64748B;
  --text-body: #475569;
  --input-bg: #FFFFFF;
  --input-border: rgba(0,0,0,0.12);
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --glow: none;
}

/* ── RESET & BASE ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 15px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
  -webkit-font-smoothing: antialiased;
}

/* ── UTILITIES ── */
.mono { font-family: var(--mono); }
.dim { color: var(--text-dim); }
.teal { color: var(--teal); }
.hide { display: none !important; }
.fade-in { animation: fadeIn 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── LAYOUT ── */
.shell { max-width: 1080px; margin: 0 auto; padding: 24px; }
@media (max-width: 640px) { .shell { padding: 14px; } }

/* ── HEADER ── */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 12px; flex-wrap: wrap; }
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-logo { width: 34px; height: 34px; border-radius: 9px; background: linear-gradient(135deg, var(--teal), var(--teal-dim)); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 700; color: #fff; }
.header-title { font-size: 18px; font-weight: 700; line-height: 1.2; }
.header-sub { font-size: 10px; font-family: var(--mono); color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.header-meta { text-align: right; font-size: 11px; font-family: var(--mono); color: var(--text-dim); line-height: 1.5; }
.header-agent { color: var(--teal); }

/* ── THEME TOGGLE ── */
.theme-btn {
  width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--surface); color: var(--text-dim); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all var(--transition);
}
.theme-btn:hover { border-color: var(--teal); color: var(--teal); }
.theme-btn svg { width: 16px; height: 16px; }

/* ── LOGOUT ── */
.logout-btn {
  padding: 6px 14px; border-radius: var(--radius-xs); font-size: 10px; font-family: var(--mono);
  text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;
  border: 1px solid rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); color: #FCA5A5;
  transition: all var(--transition);
}
.logout-btn:hover { background: rgba(239,68,68,0.15); }

/* ── STAT CARDS ── */
.stats { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.stat {
  flex: 1; min-width: 130px; padding: 16px 18px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  transition: border-color var(--transition);
}
.stat:hover { border-color: var(--border-hover); }
.stat-label { font-size: 10px; font-family: var(--mono); color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--teal); line-height: 1; }
.stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* ── ALERTS ── */
.alert {
  border-radius: var(--radius); padding: 12px 16px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 10px; font-size: 13px;
}
.alert-red { background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.2); color: #FCA5A5; }
.alert-amber { background: rgba(245,158,11,0.07); border: 1px solid rgba(245,158,11,0.2); color: #FDE68A; }

/* ── TABS ── */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; padding: 8px 10px 4px 0; overflow: visible; -webkit-overflow-scrolling: touch; }
.tab {
  padding: 8px 22px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  border: 1px solid var(--border); background: var(--surface); color: var(--text-dim);
  cursor: pointer; white-space: nowrap; position: relative; transition: all var(--transition);
  font-family: var(--font); overflow: visible;
}
.tab:hover { border-color: var(--border-hover); color: var(--text); }
.tab.active { border-color: rgba(0,180,182,0.4); background: rgba(0,180,182,0.1); color: var(--teal-glow); }
.tab-badge {
  position: absolute; top: -6px; right: -8px;
  background: var(--red); color: #fff; font-size: 9px; font-weight: 700;
  padding: 2px 6px; border-radius: 10px; font-family: var(--mono);
  min-width: 20px; text-align: center; line-height: 1.2;
  box-shadow: 0 1px 4px rgba(239,68,68,0.35);
}

/* ── PILLS ── */
.pill {
  display: inline-block; padding: 3px 9px; border-radius: var(--radius-xs);
  font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px;
  white-space: nowrap; line-height: 1.4;
}
.pill-green { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: var(--green); }
.pill-amber { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); color: var(--amber); }
.pill-red { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
.pill-purple { background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.3); color: var(--purple); }
.pill-teal { background: rgba(0,180,182,0.1); border: 1px solid rgba(0,180,182,0.25); color: var(--teal); }
.pill-muted { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); }

/* ── BUTTONS ── */
.btn {
  padding: 9px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--font); border: none; transition: all var(--transition);
}
.btn:disabled { opacity: 0.45; cursor: default; }
.btn-primary { background: linear-gradient(135deg, var(--teal), var(--teal-dim)); color: #fff; }
.btn-primary:hover:not(:disabled) { box-shadow: 0 2px 12px rgba(0,180,182,0.25); }
.btn-approve { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.35); color: var(--green); }
.btn-approve:hover { background: rgba(16,185,129,0.22); }
.btn-reject { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.35); color: var(--red); }
.btn-reject:hover { background: rgba(239,68,68,0.22); }

/* ── INPUTS ── */
.input {
  width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--input-border); background: var(--input-bg);
  color: var(--text); font-size: 14px; font-family: var(--font);
  transition: border-color var(--transition);
}
.input:focus { outline: none; border-color: var(--teal); }
.input-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }

/* ── TOGGLE SWITCH ── */
.toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; cursor: pointer; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  transition: all var(--transition);
}
.toggle-track::before {
  content: ''; position: absolute; height: 18px; width: 18px; left: 2px; bottom: 2px;
  background: var(--text-dim); border-radius: 50%; transition: all var(--transition);
}
.toggle input:checked + .toggle-track { background: rgba(0,180,182,0.25); border-color: rgba(0,180,182,0.4); }
.toggle input:checked + .toggle-track::before { transform: translateX(20px); background: var(--teal); }

/* ── CLIENT CARDS ── */
.client-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 18px; margin-bottom: 8px; cursor: pointer; transition: all var(--transition);
}
.client-card:hover { border-color: var(--border-hover); }
.client-card.open { border-color: rgba(0,180,182,0.3); border-left: 3px solid var(--teal); }
.client-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.client-name { font-weight: 600; font-size: 14px; }
.client-meta { display: flex; gap: 12px; font-size: 12px; font-family: var(--mono); color: var(--text-dim); }
.client-detail { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.detail-row { display: flex; gap: 16px; font-size: 13px; color: var(--text-body); margin-bottom: 7px; flex-wrap: wrap; }
.detail-label { color: var(--text-dim); min-width: 95px; flex-shrink: 0; }

/* ── REVIEW QUEUE GRID ── */
.post-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
@media (max-width: 860px) { .post-grid { grid-template-columns: 1fr; } }

.post-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; box-shadow: var(--shadow); transition: all var(--transition);
}
.post-card:hover { border-color: var(--border-hover); }

/* Social platform chrome header */
.post-chrome {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--surface);
}
.post-chrome-left { display: flex; align-items: center; gap: 8px; }
.post-avatar {
  width: 28px; height: 28px; border-radius: 50%; background: var(--teal);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff;
}
.post-chrome-name { font-size: 12px; font-weight: 600; }
.post-chrome-dest { font-size: 10px; color: var(--text-dim); }

/* Post image area */
.post-img-wrap { position: relative; overflow: hidden; cursor: crosshair; }
.post-img {
  width: 100%; display: block; object-fit: cover;
  transition: object-position 0.15s ease;
}
.post-img.ratio-fb { aspect-ratio: 1.91 / 1; }
.post-img.ratio-ig { aspect-ratio: 1 / 1; }
.post-img.ratio-li { aspect-ratio: 1.91 / 1; }
.post-img.ratio-tw { aspect-ratio: 16 / 9; }
.post-img.ratio-pin { aspect-ratio: 2 / 3; }
.post-img.ratio-tt { aspect-ratio: 9 / 16; }
.post-img.ratio-gbp { aspect-ratio: 1.91 / 1; }
.post-no-img {
  width: 100%; display: flex; align-items: center; justify-content: center;
  background: var(--surface); color: var(--text-dim); font-size: 12px;
}
.post-no-img.ratio-fb { aspect-ratio: 1.91 / 1; }
.post-no-img.ratio-ig { aspect-ratio: 1 / 1; }
.post-no-img.ratio-li { aspect-ratio: 1.91 / 1; }
.post-no-img.ratio-tw { aspect-ratio: 16 / 9; }
.post-no-img.ratio-pin { aspect-ratio: 2 / 3; }
.post-no-img.ratio-tt { aspect-ratio: 9 / 16; }
.post-no-img.ratio-gbp { aspect-ratio: 1.91 / 1; }

.post-type-badge {
  position: absolute; top: 8px; left: 8px;
}
.post-img-hint {
  position: absolute; bottom: 8px; left: 8px;
  font-size: 9px; color: #fff; background: rgba(0,0,0,0.55); padding: 2px 7px;
  border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity 0.2s;
}
.post-img-wrap:hover .post-img-hint { opacity: 1; }
.focal-dot {
  position: absolute; width: 10px; height: 10px; border-radius: 50%;
  border: 2px solid var(--teal-glow); background: rgba(0,212,214,0.25);
  transform: translate(-50%, -50%); pointer-events: none;
  box-shadow: 0 0 6px rgba(0,212,214,0.3);
}
.change-img-btn {
  position: absolute; bottom: 8px; right: 8px;
  padding: 5px 12px; border-radius: var(--radius-xs); border: none;
  background: rgba(0,0,0,0.65); color: #fff; font-size: 10px; font-weight: 600;
  cursor: pointer; backdrop-filter: blur(4px); font-family: var(--font);
  transition: background var(--transition);
}
.change-img-btn:hover { background: rgba(0,180,182,0.75); }

/* Image picker panel */
.img-picker { padding: 12px; background: rgba(0,0,0,0.12); display: none; }
.img-picker.open { display: block; }
.img-search-row { display: flex; gap: 6px; margin-bottom: 10px; }
.img-search-input {
  flex: 1; padding: 7px 10px; border-radius: var(--radius-xs);
  border: 1px solid var(--input-border); background: var(--input-bg);
  color: var(--text); font-size: 12px; font-family: var(--font);
}
.img-search-input:focus { outline: none; border-color: var(--teal); }
.img-search-btn {
  padding: 7px 14px; border-radius: var(--radius-xs); border: none;
  background: var(--teal); color: #fff; font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--font);
}
.img-results { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
.img-results img {
  width: 120px; height: 80px; object-fit: cover; border-radius: var(--radius-xs);
  cursor: pointer; border: 2px solid transparent; transition: all 0.15s; flex-shrink: 0;
}
.img-results img:hover { border-color: var(--teal); }
.img-results img.picked { border-color: var(--teal-glow); box-shadow: 0 0 10px rgba(0,212,214,0.3); }
.img-status { font-size: 10px; color: var(--teal); margin-top: 4px; }

/* Post body */
.post-body { padding: 14px; }
.post-platform-tabs { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
.post-plat-tab {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--border); background: var(--surface); color: var(--text-dim);
  cursor: pointer; transition: all var(--transition); font-family: var(--font);
  display: flex; align-items: center; gap: 5px;
}
.post-plat-tab .plat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.post-plat-tab:hover { border-color: var(--border-hover); color: var(--text); }
/* Platform-specific active states */
.post-plat-tab.active-fb { border-color: #1877F2; background: rgba(24,119,242,0.1); color: #1877F2; }
.post-plat-tab.active-ig { border-color: #E1306C; background: rgba(225,48,108,0.1); color: #E1306C; }
.post-plat-tab.active-li { border-color: #0A66C2; background: rgba(10,102,194,0.1); color: #0A66C2; }
.post-plat-tab.active-tw { border-color: #000; background: rgba(0,0,0,0.08); color: var(--text); }
[data-theme="dark"] .post-plat-tab.active-tw { border-color: #fff; background: rgba(255,255,255,0.08); color: #fff; }
.post-plat-tab.active-pin { border-color: #E60023; background: rgba(230,0,35,0.1); color: #E60023; }
.post-plat-tab.active-tt { border-color: #FE2C55; background: rgba(254,44,85,0.08); color: #FE2C55; }
.post-plat-tab.active-gbp { border-color: #4285F4; background: rgba(66,133,244,0.1); color: #4285F4; }

/* TikTok video preview */
.post-video { width: 100%; display: block; border-radius: 0; }
.post-video.ratio-tt { aspect-ratio: 9 / 16; max-height: 400px; object-fit: cover; }

.post-caption { font-size: 13px; line-height: 1.65; color: var(--text-body); white-space: pre-wrap; margin-bottom: 8px; }
.post-hashtags { font-size: 11px; color: var(--teal); margin-bottom: 8px; word-break: break-all; }
.post-footer {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px; font-family: var(--mono); color: var(--text-dim);
  padding-top: 8px; border-top: 1px solid var(--border); margin-bottom: 8px;
}
.post-actions { display: flex; gap: 6px; }
.post-actions .btn { padding: 7px 16px; font-size: 12px; }
.post-feedback {
  font-size: 11px; padding: 6px 10px; border-radius: var(--radius-xs);
  margin-top: 6px; display: none;
}
.post-feedback.show { display: block; }

/* ── QUEUE TOOLBAR ── */
.queue-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
}
.queue-toolbar-left { display: flex; align-items: center; gap: 8px; }
.queue-toolbar-right { display: flex; align-items: center; gap: 6px; }

/* ── CONTENT MIX BAR ── */
.mix-bar { display: flex; height: 5px; border-radius: 3px; overflow: hidden; gap: 2px; margin-bottom: 14px; }
.mix-segment { border-radius: 3px; transition: flex var(--transition); }

/* ── SETTINGS GRID ── */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 700px) { .settings-grid { grid-template-columns: 1fr; } }
.settings-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; box-shadow: var(--shadow);
}
.settings-card.full { grid-column: 1 / -1; }
.settings-title {
  font-size: 11px; font-family: var(--mono); color: var(--teal);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px;
}
.pill-select {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.pill-select-btn {
  padding: 6px 14px; border-radius: var(--radius-sm); font-size: 12px;
  border: 1px solid var(--border); background: var(--surface); color: var(--text-dim);
  cursor: pointer; font-family: var(--font); transition: all var(--transition);
}
.pill-select-btn.active {
  border-color: rgba(0,180,182,0.4); background: rgba(0,180,182,0.1);
  color: var(--teal-glow); font-weight: 600;
}
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 13px; }
.setting-desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.setting-saved { font-size: 10px; color: var(--green); opacity: 0; transition: opacity 0.3s; margin-left: 6px; }
.setting-saved.show { opacity: 1; }

/* ── DESTINATION TAGS ── */
.dest-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.dest-tag {
  padding: 5px 11px; border-radius: var(--radius-xs); font-size: 12px;
  background: rgba(0,180,182,0.07); border: 1px solid rgba(0,180,182,0.2); color: var(--teal);
  display: flex; align-items: center; gap: 6px;
}
.dest-tag-x { cursor: pointer; opacity: 0.5; font-size: 14px; }
.dest-tag-x:hover { opacity: 1; }
.dest-add-btn {
  padding: 5px 11px; border-radius: var(--radius-xs); font-size: 12px;
  border: 1px dashed var(--border); background: transparent; color: var(--text-dim);
  cursor: pointer; font-family: var(--font);
}

/* ── COLOUR SWATCHES ── */
.colour-row { display: flex; gap: 16px; }
.colour-item { flex: 1; }
.colour-preview { display: flex; align-items: center; gap: 8px; }
.colour-swatch { width: 36px; height: 36px; border-radius: var(--radius-sm); border: 2px solid var(--border); }

/* ── PROMPT CREATE ── */
.prompt-box {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 24px; box-shadow: var(--shadow); max-width: 640px;
}
.prompt-textarea {
  width: 100%; min-height: 100px; padding: 12px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--input-border); background: var(--input-bg);
  color: var(--text); font-size: 14px; font-family: var(--font); resize: vertical;
  line-height: 1.6;
}

.prompt-examples { margin-top: 12px; }
.prompt-example {

/* ── CALENDAR (Apple Calendar time-axis layout) ── */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.cal-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }

.cal-nav { display: flex; align-items: center; gap: 6px; }
.cal-nav-btn {

  background: var(--surface); color: var(--text-dim); cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center; transition: all var(--transition);
  font-family: var(--font); line-height: 1;
}
.cal-nav-btn:hover { border-color: var(--teal); color: var(--teal); background: rgba(0,180,182,0.06); }
.cal-today-btn {
  padding: 5px 16px; border-radius: 16px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-dim); cursor: pointer; font-size: 12px;

}

/* Day column headers */
.cal-day-bar {
  display: grid; grid-template-columns: 56px repeat(7, 1fr); gap: 0;
  border-bottom: 1px solid var(--border); margin-bottom: 0;
}

.cal-day-hdr {

}

.cal-day-hdr-num {

}
.cal-day-hdr.today .cal-day-hdr-name { color: var(--red); font-weight: 700; }
.cal-day-hdr.today .cal-day-hdr-num { background: var(--red); color: #fff; }

/* Time grid body */
.cal-body-scroll { overflow-y: auto; max-height: 560px; position: relative; }
.cal-body {
  display: grid; grid-template-columns: 56px repeat(7, 1fr); gap: 0;
  position: relative; min-height: 100%;
}

/* Time gutter (left labels) */
.cal-time-label {
  height: 60px; padding-right: 10px; text-align: right; position: relative;
  font-size: 11px; font-family: var(--mono); color: var(--text-dim); line-height: 1;
}
.cal-time-label span { position: relative; top: -6px; }

/* Day columns */
.cal-col {
  border-left: 1px solid var(--border); position: relative; min-height: 60px;
}
.cal-col.today { background: rgba(0,180,182,0.02); }

/* Hour grid lines */
.cal-hour-line {
  position: absolute; left: 0; right: 0; height: 1px;
  background: var(--border); pointer-events: none;
}

/* Drop target highlight */
.cal-col.drop-target { background: rgba(0,180,182,0.06); }
.cal-drop-time {
  position: absolute; left: 0; right: 0; height: 2px; background: var(--teal);
  pointer-events: none; z-index: 15;
}
.cal-drop-time::after {
  content: attr(data-time); position: absolute; left: 4px; top: -8px;
  font-size: 9px; font-family: var(--mono); color: var(--teal); font-weight: 700;
  background: var(--card); padding: 0 4px; border-radius: 2px;
}

/* Current time indicator (red line like Apple) */
.cal-now {
  position: absolute; left: 56px; right: 0; height: 2px;
  background: var(--red); z-index: 10; pointer-events: none;
}
.cal-now::before {
  content: ''; position: absolute; left: -4px; top: -4px;
  width: 10px; height: 10px; border-radius: 50%; background: var(--red);
}
.cal-now-time {
  position: absolute; left: 0; top: -7px; width: 56px;
  font-size: 10px; font-family: var(--mono); color: var(--red); font-weight: 700;
  text-align: right; padding-right: 10px;
}

/* Posts on the time grid */
.cal-post {
  position: absolute; left: 2px; right: 2px;
  border-radius: 5px; border-left: 3px solid var(--teal);
  background: rgba(0,180,182,0.08); padding: 5px 7px;

}
.cal-post:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.2); transform: scale(1.01); z-index: 8; }
.cal-post:active { cursor: grabbing; opacity: 0.8; }
.cal-post-time { font-family: var(--mono); color: var(--text-dim); font-size: 9px; line-height: 1; }
.cal-post-dest { font-weight: 600; color: var(--text); line-height: 1.3; margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-post-foot { display: flex; align-items: center; gap: 4px; }
.cal-platform-icon {

.cal-platform-fb { background: #1877F2; }

.cal-platform-li { background: #0A66C2; }

.cal-status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.cal-status-approved { background: var(--green); }
.cal-status-rejected { background: var(--red); }
.cal-status-suppressed { background: var(--amber); }

/* Calendar hover popup */
.cal-popup {
  position: fixed; z-index: 200; width: 320px;
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: 0 16px 48px rgba(0,0,0,0.4); overflow: hidden;

}
.cal-popup.visible { opacity: 1; }
.cal-popup-img { width: 100%; aspect-ratio: 1.91/1; object-fit: cover; display: block; }
.cal-popup-body { padding: 12px; }
.cal-popup-caption { font-size: 12px; line-height: 1.5; color: var(--text-body); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
.cal-popup-meta { font-size: 10px; font-family: var(--mono); color: var(--text-dim); margin-top: 6px; display: flex; justify-content: space-between; }

/* Calendar legend */
.cal-legend { display: flex; gap: 16px; margin-top: 14px; flex-wrap: wrap; font-size: 11px; color: var(--text-dim); }
.cal-legend-item { display: flex; align-items: center; gap: 4px; }

@media (max-width: 700px) {
  .cal-body-scroll { max-height: 400px; }
  .cal-day-bar { grid-template-columns: 40px repeat(7, 1fr); }
  .cal-body { grid-template-columns: 40px repeat(7, 1fr); }
  .cal-time-label { padding-right: 4px; font-size: 9px; }
  .cal-day-hdr-num { width: 28px; height: 28px; font-size: 14px; }
  .cal-popup { width: 240px; }
  .cal-now { left: 40px; }
  .cal-now-time { width: 40px; padding-right: 4px; font-size: 8px; }
}

/* ── ONBOARDING SCANNER ── */
.scan-panel {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow); display: none;
}

@keyframes spin { to { transform: rotate(360deg); } }
.scan-results { display: none; }
.scan-results.show { display: block; }
.scan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
@media (max-width: 640px) { .scan-grid { grid-template-columns: 1fr; } }
.scan-field { }
.scan-field label { display: block; font-size: 11px; font-family: var(--mono); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.scan-field input, .scan-field textarea {
  width: 100%; padding: 8px 12px; border-radius: var(--radius-xs);
  border: 1px solid var(--input-border); background: var(--input-bg);

}
.scan-field input:focus, .scan-field textarea:focus { outline: none; border-color: var(--teal); }
.scan-field textarea { min-height: 60px; resize: vertical; }
.scan-colour-preview { display: flex; align-items: center; gap: 6px; }
.scan-colour-preview .colour-swatch { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); flex-shrink: 0; }
.scan-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.scan-tag {

}

}
.scan-confidence-high { background: rgba(16,185,129,0.1); color: var(--green); }
.scan-confidence-medium { background: rgba(245,158,11,0.1); color: var(--amber); }
.scan-confidence-low { background: rgba(239,68,68,0.1); color: var(--red); }
.scan-save-row { display: flex; gap: 8px; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.add-client-btn {

}

<script>
/* ================================================================
   LUNA MARKETING — ADMIN DASHBOARD
   Clean rebuild — 12 April 2026
   ================================================================ */

(function() {
'use strict';

var PASSWORD = 'travelgenix2026';
var SESSION_KEY = 'luna_mkt_session';
var THEME_KEY = 'luna_mkt_theme';
var MAX_AGE = 4 * 60 * 60 * 1000; // 4 hours

var state = {
  agent: '', company: '', theme: 'dark',
  view: 'dashboard', platform: 'facebook',
  clients: [], posts: [], selected: {},
  calWeekOffset: 0
};

var RATIOS = { facebook: 'ratio-fb', instagram: 'ratio-ig', linkedin: 'ratio-li', twitter: 'ratio-tw', pinterest: 'ratio-pin', tiktok: 'ratio-tt', gbp: 'ratio-gbp' };
var TYPE_COLORS = {
  'Destination Inspiration': '#00B4B6', 'Offer Highlight': '#F5A623',
  'Travel Tips': '#8B5CF6', 'Social Proof': '#EC4899',
  'Seasonal': '#10B981', 'Behind the Scenes': '#6366F1'
};

/* ── DOM HELPERS ── */
var $ = function(id) { return document.getElementById(id); };
var $$ = function(sel) { return document.querySelectorAll(sel); };

/* ── THEME ── */
function initTheme() {
  try { state.theme = localStorage.getItem(THEME_KEY) || 'dark'; } catch(e) {}
  applyTheme();
}
function applyTheme() {
  document.body.setAttribute('data-theme', state.theme);
  var isSun = state.theme === 'dark';
  $('themeIconSun').classList.toggle('hide', !isSun);
  $('themeIconMoon').classList.toggle('hide', isSun);
}
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  try { localStorage.setItem(THEME_KEY, state.theme); } catch(e) {}
  applyTheme();
}

/* ── LOGIN ── */
function initLogin() {
  $('loginBtn').addEventListener('click', doLogin);
  $('loginPass').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  $('loginCompany').addEventListener('keydown', function(e) { if (e.key === 'Enter') $('loginName').focus(); });
  $('loginName').addEventListener('keydown', function(e) { if (e.key === 'Enter') $('loginPass').focus(); });
  $('pwEye').addEventListener('click', function() {
    var inp = $('loginPass');
    var isHidden = inp.type === 'password';
    inp.type = isHidden ? 'text' : 'password';
    this.innerHTML = isHidden ? '&#128064;' : '&#128065;';
  });
  $('logoutBtn').addEventListener('click', doLogout);
  $('themeBtn').addEventListener('click', toggleTheme);

  // Session restore
  try {
    var saved = JSON.parse(sessionStorage.getItem(SESSION_KEY));
    if (saved && Date.now() - saved.t < MAX_AGE && saved.a && saved.c) {
      state.agent = saved.a; state.company = saved.c;
      showApp();
      return;
    }
  } catch(e) {}
}

function doLogin() {
  var company = $('loginCompany').value.trim();
  var name = $('loginName').value.trim();
  var pass = $('loginPass').value;
  var err = $('loginErr');
  if (!company) { err.textContent = 'Please enter your company name'; err.classList.add('show'); return; }
  if (!name) { err.textContent = 'Please enter your name'; err.classList.add('show'); return; }
  if (pass !== PASSWORD) { err.textContent = 'Incorrect password'; err.classList.add('show'); return; }
  state.agent = name; state.company = company;
  try { sessionStorage.setItem(SESSION_KEY, JSON.stringify({ a: name, c: company, t: Date.now() })); } catch(e) {}
  showApp();
}

function doLogout() {
  try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {}
  $('loginScreen').classList.remove('hidden');
  $('app').classList.add('hide');
  $('loginPass').value = '';
  $('loginPass').type = 'password';
  $('pwEye').innerHTML = '&#128065;';
  $('loginErr').classList.remove('show');
}

function showApp() {
  $('loginScreen').classList.add('hidden');
  $('app').classList.remove('hide');
  $('agentLabel').textContent = state.agent + ' @ ' + state.company;
  $('clock').textContent = new Date().toLocaleString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  loadDashboard();
  loadReviewQueue();
}

/* ── TABS ── */
function initTabs() {
  $('mainTabs').addEventListener('click', function(e) {
    var tab = e.target.closest('.tab');
    if (!tab) return;
    var view = tab.getAttribute('data-view');
    $$('.tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    ['dashboard','review','create','settings','calendar'].forEach(function(v) {
      var el = $('view-' + v);
      if (el) { el.classList.toggle('hide', v !== view); if (v === view) el.classList.add('fade-in'); }
    });
    state.view = view;
    if (view === 'settings') renderSettings();
    if (view === 'create') renderCreate();
    if (view === 'calendar') renderCalendar();
  });
}

/* ── DASHBOARD ── */
async function loadDashboard() {
  try {
    var res = await fetch('/api/clients');
    var data = await res.json();
    if (!data.success) throw new Error(data.error);
    state.clients = data.clients;
    renderStats(data.totals);
    renderAlerts(data.clients);
    renderDashboardView(data);
    renderClients(data.clients);
  } catch(err) {
    $('view-dashboard').innerHTML = '<div style="padding:40px;text-align:center;color:var(--red)">Error loading: ' + err.message + '</div>';
  }
}

function renderStats(t) {
  $('statsRow').innerHTML = [
    statHTML('Active Clients', t.active, t.total_clients + ' total'),
    statHTML('Total Posts', t.total_posts, t.total_queued + ' queued'),
    statHTML('Published', t.total_published, ''),
    statHTML('Suppressed', t.total_suppressed, 'by FCDO gate')
  ].join('');
}
function statHTML(l, v, s) {
  return '<div class="stat"><div class="stat-label">' + l + '</div><div class="stat-value">' + v + '</div>' + (s ? '<div class="stat-sub">' + s + '</div>' : '') + '</div>';
}

function renderAlerts(clients) {
  var h = '';
  var errs = clients.filter(function(c) { return c.status === 'Error'; }).length;
  var supp = clients.reduce(function(a,c) { return a + (c.stats.suppressed || 0); }, 0);

async function loadReviewQueue() {
  try {
    var res = await fetch('/api/posts?status=Queued');
    var data = await res.json();
    if (!data.success) throw new Error(data.error);
    state.posts = data.posts;
    // Badge
    var badge = $('reviewTab').querySelector('.tab-badge');
    if (!badge) { badge = document.createElement('span'); badge.className = 'tab-badge'; $('reviewTab').appendChild(badge); }
    badge.textContent = data.count;
    badge.style.display = data.count > 0 ? 'inline' : 'none';
    renderReviewQueue();
  } catch(err) {
    $('view-review').innerHTML = '<div style="padding:40px;text-align:center;color:var(--red)">Error: ' + err.message + '</div>';
  }
}

/* ── CALENDAR ── */
var CAL_START_HOUR = 6;
var CAL_END_HOUR = 22;
var CAL_HOUR_PX = 60;
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function getWeekDates(offset) {
  var now = new Date();
  var day = now.getDay();
  var mondayOffset = day === 0 ? -6 : 1 - day;
  var monday = new Date(now);
  monday.setDate(now.getDate() + mondayOffset + (offset * 7));
  var dates = [];
  for (var i = 0; i < 7; i++) { var d = new Date(monday); d.setDate(monday.getDate() + i); dates.push(d); }
  return dates;
}

function isToday(d) {
  var n = new Date();
  return d.getDate() === n.getDate() && d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
}

function matchPostToDay(post, dayIdx) {
  var days = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
  return (post.title || '').toLowerCase().includes(days[dayIdx]);
}

function statusClass(s) {
  s = (s || '').toLowerCase();
  if (s === 'approved') return 'cal-status-approved';
  if (s === 'replaced') return 'cal-status-rejected';
  if (s === 'suppressed') return 'cal-status-suppressed';
  return 'cal-status-queued';
}

function statusLabel(s) {
  s = (s || '').toLowerCase();
  if (s === 'approved') return 'Approved';
  if (s === 'replaced') return 'Rejected';
  if (s === 'suppressed') return 'Suppressed';
  return 'Queued';
}

function parseTime(t) {
  var parts = (t || '09:00').split(':');
  return { h: parseInt(parts[0]) || 9, m: parseInt(parts[1]) || 0 };
}

function timeToTop(h, m) {
  return ((h - CAL_START_HOUR) + m / 60) * CAL_HOUR_PX;
}

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function renderCalendar() {
  var dates = getWeekDates(state.calWeekOffset);
  var dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var posts = state.posts;
  var totalHours = CAL_END_HOUR - CAL_START_HOUR;
  var gridHeight = totalHours * CAL_HOUR_PX;

  // Month/year title (Apple style)
  var monthLabel = MONTHS[dates[0].getMonth()];
  var yearLabel = dates[0].getFullYear();
  if (dates[0].getMonth() !== dates[6].getMonth()) {
    monthLabel = MONTHS[dates[0].getMonth()] + ' / ' + MONTHS[dates[6].getMonth()];
  }

  var h = '';

  // Header row: title left, nav right
  h += '<div class="cal-header">';
  h += '<div class="cal-title"><span class="cal-title-month">' + monthLabel + '</span> <span class="cal-title-year">' + yearLabel + '</span></div>';
  h += '<div class="cal-nav">';
  h += '<button class="cal-nav-btn" onclick="Luna.calPrev()">&#8249;</button>';
  h += '<button class="cal-today-btn" onclick="Luna.calToday()">Today</button>';
  h += '<button class="cal-nav-btn" onclick="Luna.calNext()">&#8250;</button>';
  h += '</div></div>';

  // Day column headers
  h += '<div class="cal-day-bar"><div class="cal-day-bar-gutter"></div>';
  for (var di = 0; di < 7; di++) {
    var td = isToday(dates[di]);
    h += '<div class="cal-day-hdr' + (td ? ' today' : '') + '">';
    h += '<div class="cal-day-hdr-name">' + dayNames[di] + '</div>';
    h += '<div class="cal-day-hdr-num">' + dates[di].getDate() + '</div>';
    h += '</div>';
  }
  h += '</div>';

  // Scrollable time body
  h += '<div class="cal-body-scroll" id="calScroll">';

  // Now indicator (only show for current week)
  if (state.calWeekOffset === 0) {
    var now = new Date();
    var nowH = now.getHours();
    var nowM = now.getMinutes();
    if (nowH >= CAL_START_HOUR && nowH < CAL_END_HOUR) {
      var nowTop = timeToTop(nowH, nowM);
      h += '<div class="cal-now" style="top:' + nowTop + 'px"><span class="cal-now-time">' + pad2(nowH) + ':' + pad2(nowM) + '</span></div>';
    }
  }

  h += '<div class="cal-body" style="height:' + gridHeight + 'px">';

  // Time gutter + hour lines
  for (var hr = CAL_START_HOUR; hr < CAL_END_HOUR; hr++) {
    var top = (hr - CAL_START_HOUR) * CAL_HOUR_PX;
    h += '<div class="cal-time-label" style="position:absolute;top:' + top + 'px;left:0;width:56px;height:' + CAL_HOUR_PX + 'px"><span>' + pad2(hr) + ':00</span></div>';
    h += '<div class="cal-hour-line" style="top:' + top + 'px;left:56px"></div>';
  }

  // Day columns
  for (var ci = 0; ci < 7; ci++) {
    var isT = isToday(dates[ci]);
    var colLeft = 'calc(56px + ' + ci + ' * ((100% - 56px) / 7))';
    var colWidth = 'calc((100% - 56px) / 7)';

    h += '<div class="cal-col' + (isT ? ' today' : '') + '" style="position:absolute;top:0;left:' + colLeft + ';width:' + colWidth + ';height:' + gridHeight + 'px;border-left:1px solid var(--border)" data-day="' + ci + '" ondragover="event.preventDefault();Luna.calDragOver(event,this)" ondragleave="Luna.calDragLeave(this)" ondrop="Luna.calDrop(event,' + ci + ')">';

    // Posts for this day
    var dayPosts = posts.filter(function(p) { return matchPostToDay(p, ci); });
    dayPosts.forEach(function(p) {
      var time = parseTime(p.scheduled_time);
      var pTop = timeToTop(time.h, time.m);
      var sc = statusClass(p.status);
      var sl = statusLabel(p.status);
      var tc = TYPE_COLORS[p.content_type] || '#94A3B8';

      h += '<div class="cal-post" draggable="true" data-pid="' + p.id + '" style="top:' + pTop + 'px;border-left-color:' + tc + ';height:50px"';
      h += ' ondragstart="Luna.calDragStart(event,\'' + p.id + '\')"';
      h += ' onmouseenter="Luna.calShowPopup(event,\'' + p.id + '\')"';
      h += ' onmousemove="Luna.calMovePopup(event)"';
      h += ' onmouseleave="Luna.calHidePopup()">';
      h += '<div class="cal-post-time">' + pad2(time.h) + ':' + pad2(time.m) + '</div>';
      h += '<div class="cal-post-dest">' + escHTML(p.destination || 'General') + '</div>';
      h += '<div class="cal-post-foot">';
      h += '<span class="cal-platform-icon cal-platform-fb" title="Facebook">f</span>';
      h += '<span class="cal-platform-icon cal-platform-ig" title="Instagram">ig</span>';
      h += '<span class="cal-platform-icon cal-platform-tw" title="Twitter/X">x</span>';
      h += '<span class="cal-platform-icon cal-platform-pin" title="Pinterest">P</span>';
      h += '<span class="cal-platform-icon cal-platform-tt" title="TikTok">tt</span>';
      h += '<span class="cal-platform-icon cal-platform-gbp" title="Google Business">G</span>';
      h += '<span class="cal-status-dot ' + sc + '" title="' + sl + '"></span>';
      h += '</div></div>';
    });

    h += '</div>';
  }

  h += '</div>'; // cal-body
  h += '</div>'; // cal-body-scroll

  // Legend
  h += '<div class="cal-legend">';
  h += '<span class="cal-legend-item"><span class="cal-status-dot cal-status-queued"></span> Queued</span>';
  h += '<span class="cal-legend-item"><span class="cal-status-dot cal-status-approved"></span> Approved</span>';
  h += '<span class="cal-legend-item"><span class="cal-status-dot cal-status-rejected"></span> Rejected</span>';
  h += '<span class="cal-legend-item"><span class="cal-status-dot cal-status-suppressed"></span> Suppressed</span>';
  h += '<span style="margin-left:auto" class="cal-legend-item"><span class="cal-platform-icon cal-platform-fb" style="width:12px;height:12px;font-size:7px">f</span> FB</span>';
  h += '<span class="cal-legend-item"><span class="cal-platform-icon cal-platform-ig" style="width:12px;height:12px;font-size:7px">ig</span> IG</span>';
  h += '<span class="cal-legend-item"><span class="cal-platform-icon cal-platform-tw" style="width:12px;height:12px;font-size:7px">x</span> X</span>';
  h += '<span class="cal-legend-item"><span class="cal-platform-icon cal-platform-pin" style="width:12px;height:12px;font-size:7px">P</span> Pin</span>';
  h += '<span class="cal-legend-item"><span class="cal-platform-icon cal-platform-tt" style="width:12px;height:12px;font-size:7px">tt</span> TT</span>';
  h += '<span class="cal-legend-item"><span class="cal-platform-icon cal-platform-gbp" style="width:12px;height:12px;font-size:7px">G</span> GBP</span>';
  h += '</div>';

  $('view-calendar').innerHTML = h;

  // Auto-scroll to first post or 08:00
  var scroll = $('calScroll');
  if (scroll) {
    var firstPost = posts[0];
    var scrollTo = firstPost ? timeToTop(parseTime(firstPost.scheduled_time).h, 0) - 20 : timeToTop(8, 0);
    scroll.scrollTop = Math.max(0, scrollTo);
  }
}

/* ── HELPERS ── */
function escHTML(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderScanResults(p, url) {
  var results = $('scanResults');
  var confCls = (p.confidence || '').toLowerCase() === 'high' ? 'scan-confidence-high' : (p.confidence || '').toLowerCase() === 'medium' ? 'scan-confidence-medium' : 'scan-confidence-low';
  var h = '';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div style="font-size:15px;font-weight:600">Scan Results</div><span class="scan-confidence ' + confCls + '">' + (p.confidence || 'Unknown') + ' confidence</span></div>';

  h += '<div class="scan-grid">';
  h += scanField('Business Name', 'scan-business', p.business_name);
  h += scanField('Trading Name', 'scan-trading', p.trading_name);
  h += scanField('Phone', 'scan-phone', p.phone);
  h += scanField('Email', 'scan-email', p.email);
  h += scanField('Primary Colour', 'scan-primary', p.primary_colour, true);
  h += scanField('Secondary Colour', 'scan-secondary', p.secondary_colour, true);
  h += '</div>';

  h += '<div class="scan-field" style="margin-bottom:12px"><label>Tone Keywords</label><input id="scan-tone" value="' + escHTML(p.tone_keywords || '') + '"></div>';
  h += '<div class="scan-field" style="margin-bottom:12px"><label>Destinations</label><textarea id="scan-destinations">' + escHTML(p.destinations || '') + '</textarea></div>';
  h += '<div class="scan-field" style="margin-bottom:12px"><label>Example Brand Phrases</label><textarea id="scan-phrases">' + escHTML(p.example_phrases || '') + '</textarea></div>';

  // Specialisms as tags
  if (p.specialisms && p.specialisms.length > 0) {
    h += '<div class="scan-field" style="margin-bottom:12px"><label>Holiday Types</label><div class="scan-tags">';
    p.specialisms.forEach(function(s) { h += '<span class="scan-tag">' + escHTML(s) + '</span>'; });
    h += '</div></div>';
  }

  // Social links found
  var socials = [];
  if (p.social_facebook) socials.push('Facebook: ' + p.social_facebook);
  if (p.social_instagram) socials.push('Instagram: ' + p.social_instagram);
  if (p.social_twitter) socials.push('Twitter/X: ' + p.social_twitter);
  if (p.social_pinterest) socials.push('Pinterest: ' + p.social_pinterest);
  if (p.social_tiktok) socials.push('TikTok: ' + p.social_tiktok);
  if (p.social_linkedin) socials.push('LinkedIn: ' + p.social_linkedin);
  if (socials.length > 0) {
    h += '<div class="scan-field" style="margin-bottom:12px"><label>Social Accounts Found</label>';
    socials.forEach(function(s) { h += '<div style="font-size:12px;color:var(--text-body);margin-bottom:2px">' + escHTML(s) + '</div>'; });
    h += '</div>';
  }

  // Voice settings detected
  h += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px">';
  h += '<div class="scan-tag">' + (p.formality || 'Balanced') + '</div>';
  h += '<div class="scan-tag">Emoji: ' + (p.emoji_usage || 'Light') + '</div>';
  h += '<div class="scan-tag">' + (p.sentence_style || 'Short and punchy') + '</div>';
  h += '<div class="scan-tag">CTA: ' + (p.cta_style || 'Question-based') + '</div>';
  h += '</div>';

  h += '<div class="scan-save-row">';
  h += '<button class="btn btn-primary" id="scanSaveBtn" onclick="Luna.saveScannedClient()">Save Client to Luna</button>';
  h += '<span style="font-size:12px;color:var(--text-dim)">Review the details above and edit anything that needs adjusting before saving.</span>';
  h += '</div>';

  results.innerHTML = h;
  results.classList.add('show');
}

function scanField(label, id, value, isColour) {
  var h = '<div class="scan-field"><label>' + label + '</label>';
  if (isColour && value) {
    h += '<div class="scan-colour-preview"><div class="colour-swatch" style="background:' + escHTML(value) + '"></div><input id="' + id + '" value="' + escHTML(value || '') + '" style="font-family:var(--mono);font-size:12px"></div>';
  } else {
    h += '<input id="' + id + '" value="' + escHTML(value || '') + '">';
  }
  return h + '</div>';
}

/* ── PUBLIC API (exposed to onclick handlers) ── */
window.Luna = {
  setPlatform: function(p) { state.platform = p; renderReviewQueue(); },
  toggleAll: function(checked) { state.posts.forEach(function(p) { state.selected[p.id] = checked; }); renderReviewQueue(); },
  toggleSel: function(id, checked) { state.selected[id] = checked; renderReviewQueue(); },

  reposition: function(evt, pid) {
    var img = $('hi-' + pid);
    if (!img || img.tagName !== 'IMG') return;
    var rect = img.getBoundingClientRect();
    var x = ((evt.clientX - rect.left) / rect.width * 100).toFixed(1);
    var y = ((evt.clientY - rect.top) / rect.height * 100).toFixed(1);
    var pos = x + '% ' + y + '%';
    img.style.objectPosition = pos;
    var dot = $('fd-' + pid);
    if (dot) { dot.style.left = x + '%'; dot.style.top = y + '%'; }
    // Debounced save
    clearTimeout(img._saveTimer);
    img._saveTimer = setTimeout(function() {
      fetch('/api/posts', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ recordId: pid, action: 'update_position', imagePosition: pos }) });
    }, 500);
  },

  togglePicker: function(pid) {
    var pk = $('pk-' + pid);
    if (pk.classList.contains('open')) { pk.classList.remove('open'); return; }
    pk.classList.add('open');
    Luna.searchImg(pid);
  },

  searchImg: async function(pid) {
    var q = $('is-' + pid).value.trim(); if (!q) return;
    var r = $('ir-' + pid); r.innerHTML = '<span style="font-size:11px;color:var(--text-dim)">Searching...</span>';
    try {
      var res = await fetch('/api/images?q=' + encodeURIComponent(q + ' travel holiday') + '&orientation=landscape&per_page=8');
      var data = await res.json();
      if (!data.images || !data.images.length) { r.innerHTML = '<span style="font-size:11px;color:var(--text-dim)">No results</span>'; return; }
      r.innerHTML = data.images.map(function(img) {
        return '<img src="' + img.src.small + '" title="By ' + img.photographer + '" onclick="Luna.pickImg(\'' + pid + '\',\'' + img.src.large + '\')">';
      }).join('');
    } catch(e) { r.innerHTML = '<span style="font-size:11px;color:var(--red)">Error</span>'; }
  },

  pickImg: async function(pid, url) {
    // Update hero
    var hero = $('hi-' + pid);
    if (hero && hero.tagName === 'IMG') { hero.src = url; hero.style.objectPosition = '50% 50%'; }
    else {
      var wrap = $('iw-' + pid);
      var ni = document.createElement('img');
      ni.className = 'post-img ' + RATIOS[state.platform]; ni.id = 'hi-' + pid;
      ni.src = url; ni.style.objectPosition = '50% 50%';
      ni.setAttribute('onclick', "Luna.reposition(event,'" + pid + "')");
      wrap.replaceChild(ni, hero);
    }
    var msg = $('imsg-' + pid); msg.textContent = 'Saving...';
    try {
      await fetch('/api/posts', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ recordId: pid, action: 'update_image', imageUrl: url, imagePosition: '50% 50%' }) });
      msg.textContent = 'Saved'; setTimeout(function() { msg.textContent = ''; }, 2000);
    } catch(e) { msg.textContent = 'Error'; }
  },

  reviewAction: async function(pid, action) {
    var fb = $('fb-' + pid);
    try {
      var res = await fetch('/api/posts', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ recordId: pid, action: action }) });
      var data = await res.json(); if (!res.ok) throw new Error(data.error);
      fb.className = 'post-feedback show';
      fb.style.background = action === 'approve' ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)';
      fb.style.border = action === 'approve' ? '1px solid rgba(16,185,129,0.25)' : '1px solid rgba(239,68,68,0.25)';
      fb.style.color = action === 'approve' ? '#6EE7B7' : '#FCA5A5';
      fb.textContent = action === 'approve' ? 'Approved' : 'Rejected';
      var card = $('pc-' + pid); if (card) { card.style.opacity = '0.3'; card.style.pointerEvents = 'none'; }
      setTimeout(function() { loadReviewQueue(); loadDashboard(); }, 1200);
    } catch(e) { fb.className = 'post-feedback show'; fb.style.background = 'rgba(239,68,68,0.1)'; fb.style.border = '1px solid rgba(239,68,68,0.25)'; fb.style.color = '#FCA5A5'; fb.textContent = 'Error: ' + e.message; }
  },

  bulkAction: async function(action) {
    var ids = Object.keys(state.selected).filter(function(id) { return state.selected[id]; });
    for (var i = 0; i < ids.length; i++) {
      await fetch('/api/posts', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ recordId: ids[i], action: action }) });
    }
    state.selected = {};
    loadReviewQueue(); loadDashboard();
  },

  toggleAutoPublish: async function(cid, val) {
    try {
      await fetch('/api/clients', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ clientId: cid, autoPublish: val }) });
      var sv = $('ap-saved'); sv.classList.add('show'); setTimeout(function() { sv.classList.remove('show'); }, 2000);
    } catch(e) { alert('Error: ' + e.message); }
  },

  generateFor: async function(cid, name, btn) {
    var fb = $('gen-fb-' + cid);
    btn.disabled = true; btn.textContent = 'Generating...';
    fb.className = 'post-feedback'; fb.style.display = 'none';
    try {
      var res = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ clientId: cid, dryRun: false }) });
      var data = await res.json(); if (!res.ok) throw new Error(data.error);
      fb.className = 'post-feedback show'; fb.style.background = 'rgba(16,185,129,0.1)'; fb.style.border = '1px solid rgba(16,185,129,0.25)'; fb.style.color = '#6EE7B7';
      fb.textContent = 'Generated ' + data.posts.length + ' posts. ' + data.queued + ' queued.' + (data.suppressed > 0 ? ' ' + data.suppressed + ' suppressed.' : '');
      setTimeout(function() { loadDashboard(); loadReviewQueue(); }, 2000);
    } catch(e) { fb.className = 'post-feedback show'; fb.style.background = 'rgba(239,68,68,0.1)'; fb.style.border = '1px solid rgba(239,68,68,0.25)'; fb.style.color = '#FCA5A5'; fb.textContent = 'Error: ' + e.message; }
    finally { btn.disabled = false; btn.textContent = 'Generate Posts'; }
  },

  createFromPrompt: async function(cid) {
    var text = $('promptText').value.trim();
    var btn = $('promptBtn'); var fb = $('prompt-fb');
    if (!text) { fb.className = 'post-feedback show'; fb.style.background = 'rgba(239,68,68,0.1)'; fb.style.border = '1px solid rgba(239,68,68,0.25)'; fb.style.color = '#FCA5A5'; fb.textContent = 'Please enter a prompt.'; return; }
    btn.disabled = true; btn.textContent = 'Generating...';
    fb.className = 'post-feedback show'; fb.style.background = 'rgba(0,180,182,0.08)'; fb.style.border = '1px solid rgba(0,180,182,0.2)'; fb.style.color = 'var(--teal)'; fb.textContent = 'Calling Claude API...';
    try {
      var res = await fetch('/api/prompt-post', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ clientId: cid, prompt: text }) });
      var data = await res.json(); if (!res.ok) throw new Error(data.error);
      fb.style.background = 'rgba(16,185,129,0.1)'; fb.style.border = '1px solid rgba(16,185,129,0.25)'; fb.style.color = '#6EE7B7';
      fb.textContent = 'Post created for ' + (data.post.destination || 'client') + '. Status: ' + data.status + (data.saved ? ' (saved to queue)' : '');
      // Show result
      var rh = '<div class="prompt-result" style="margin-top:16px">';
      if (data.image_url) rh += '<img src="' + data.image_url + '" style="width:100%;aspect-ratio:1.91/1;object-fit:cover;border-radius:var(--radius) var(--radius) 0 0">';
      rh += '<div style="padding:14px"><div style="font-size:13px;line-height:1.65;color:var(--text-body);white-space:pre-wrap">' + escHTML(data.post.caption_facebook || '') + '</div>';
      rh += '<div style="font-size:11px;color:var(--teal);margin-top:8px">' + (data.post.hashtags_facebook || []).join(' ') + '</div></div></div>';
      $('prompt-result').innerHTML = rh;
      loadReviewQueue();
    } catch(e) { fb.style.background = 'rgba(239,68,68,0.1)'; fb.style.border = '1px solid rgba(239,68,68,0.25)'; fb.style.color = '#FCA5A5'; fb.textContent = 'Error: ' + e.message; }
    finally { btn.disabled = false; btn.textContent = 'Generate Post'; }
  },

  // Website scanner
  toggleScan: function() {
    var panel = $('scanPanel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
      var inp = $('scanUrl');
      if (inp) inp.focus();
    }
  },

  scanWebsite: async function() {
    var url = $('scanUrl').value.trim();
    if (!url) return;
    var btn = $('scanBtn');
    var progress = $('scanProgress');
    var progressText = $('scanProgressText');
    var results = $('scanResults');
    btn.disabled = true;
    progress.classList.add('show');
    results.classList.remove('show');
    results.innerHTML = '';

    // Progress animation
    var steps = ['Fetching website...', 'Reading page content...', 'Analysing brand voice...', 'Extracting destinations...', 'Building profile...'];
    var stepIdx = 0;
    var stepTimer = setInterval(function() {
      stepIdx++;
      if (stepIdx < steps.length) progressText.textContent = steps[stepIdx];
    }, 3000);

    try {
      var res = await fetch('/api/scan-website', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url, save: false })
      });
      var data = await res.json();
      clearInterval(stepTimer);
      if (!res.ok) throw new Error(data.error);
      progress.classList.remove('show');
      window._scannedProfile = data.profile;
      window._scannedUrl = url;
      renderScanResults(data.profile, url);
    } catch(err) {
      clearInterval(stepTimer);
      progress.classList.remove('show');
      results.classList.add('show');
      results.innerHTML = '<div style="padding:12px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius-xs);color:#FCA5A5;font-size:13px">Error: ' + err.message + '</div>';
    } finally {
      btn.disabled = false;
    }
  },

  saveScannedClient: async function() {
    var profile = window._scannedProfile;
    var url = window._scannedUrl;
    if (!profile || !url) return;

    // Read any edits from the form
    var el = function(id) { var e = document.getElementById(id); return e ? e.value : ''; };
    profile.business_name = el('scan-business');
    profile.trading_name = el('scan-trading');
    profile.phone = el('scan-phone');
    profile.destinations = el('scan-destinations');
    profile.tone_keywords = el('scan-tone');
    profile.primary_colour = el('scan-primary');
    profile.secondary_colour = el('scan-secondary');
    profile.example_phrases = el('scan-phrases');
    profile.email = el('scan-email');

    var saveBtn = document.getElementById('scanSaveBtn');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving...'; }

    try {
      var res = await fetch('/api/scan-website', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url, save: true, profile: profile })
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error);
      if (saveBtn) { saveBtn.textContent = 'Client saved'; saveBtn.style.background = 'var(--green)'; }
      setTimeout(function() { $('scanPanel').classList.remove('open'); loadDashboard(); }, 1500);
    } catch(err) {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Error: ' + err.message; }
    }
  },

  // Calendar navigation
  calPrev: function() {
    if (state.calWeekOffset > -4) { state.calWeekOffset--; renderCalendar(); }
  },
  calNext: function() {
    if (state.calWeekOffset < 4) { state.calWeekOffset++; renderCalendar(); }
  },
  calToday: function() {
    state.calWeekOffset = 0; renderCalendar();
  },

  calDragOver: function(evt, col) {
    col.classList.add('drop-target');
    // Show time indicator line at snap position
    var yInCol = evt.offsetY;
    if (evt.target !== col) {
      // Dropped on a child, calculate relative to column
      var rect = col.getBoundingClientRect();
      yInCol = evt.clientY - rect.top;
    }
    var totalMin = (yInCol / CAL_HOUR_PX) * 60 + CAL_START_HOUR * 60;
    totalMin = Math.round(totalMin / 30) * 30;
    var h = Math.floor(totalMin / 60);
    var m = totalMin % 60;
    if (h < CAL_START_HOUR) { h = CAL_START_HOUR; m = 0; }
    if (h >= CAL_END_HOUR) { h = CAL_END_HOUR - 1; m = 0; }
    var snapY = timeToTop(h, m);
    var timeLbl = pad2(h) + ':' + pad2(m);
    // Create or update indicator
    var ind = col.querySelector('.cal-drop-time');
    if (!ind) { ind = document.createElement('div'); ind.className = 'cal-drop-time'; col.appendChild(ind); }
    ind.style.top = snapY + 'px';
    ind.setAttribute('data-time', timeLbl);
  },

  calDragLeave: function(col) {
    col.classList.remove('drop-target');
    var ind = col.querySelector('.cal-drop-time');
    if (ind) ind.remove();
  },

  // Calendar drag and drop
  calDragStart: function(evt, pid) {
    evt.dataTransfer.setData('text/plain', pid);
    evt.dataTransfer.effectAllowed = 'move';
    setTimeout(function() { evt.target.classList.add('dragging'); }, 0);
  },
  calDrop: function(evt, dayIdx) {
    evt.preventDefault();
    var col = evt.currentTarget;
    col.classList.remove('drop-target');
    // Remove time indicator
    var ind = col.querySelector('.cal-drop-time');
    if (ind) ind.remove();

    var pid = evt.dataTransfer.getData('text/plain');
    if (!pid) return;

    // Calculate Y position within column
    var yInCol = evt.offsetY;
    if (evt.target !== col) {
      var rect = col.getBoundingClientRect();
      yInCol = evt.clientY - rect.top;
    }

    // Convert Y to time, snap to 30-minute intervals
    var totalMinutes = (yInCol / CAL_HOUR_PX) * 60 + CAL_START_HOUR * 60;
    totalMinutes = Math.round(totalMinutes / 30) * 30;
    var newHour = Math.floor(totalMinutes / 60);
    var newMin = totalMinutes % 60;
    if (newHour < CAL_START_HOUR) { newHour = CAL_START_HOUR; newMin = 0; }
    if (newHour >= CAL_END_HOUR) { newHour = CAL_END_HOUR - 1; newMin = 0; }
    var newTime = pad2(newHour) + ':' + pad2(newMin);

    // Update the post's day and time
    var days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    var post = state.posts.find(function(p) { return p.id === pid; });
    if (post) {
      var oldTitle = post.title || '';
      var newTitle = oldTitle;
      days.forEach(function(d) { newTitle = newTitle.replace(new RegExp(d, 'i'), days[dayIdx]); });
      post.title = newTitle;
      post.scheduled_time = newTime;
      renderCalendar();
    }
  },

  // Calendar hover popup
  calShowPopup: function(evt, pid) {
    var post = state.posts.find(function(p) { return p.id === pid; });
    if (!post) return;
    var popup = $('calPopup');
    var img = $('calPopupImg');
    var cap = $('calPopupCaption');
    var typ = $('calPopupType');
    var sta = $('calPopupStatus');
    if (post.image_url) { img.src = post.image_url; img.style.display = 'block'; }
    else { img.style.display = 'none'; }
    cap.textContent = post.caption_facebook || post.caption_instagram || '';
    typ.textContent = post.content_type || '';
    sta.textContent = statusLabel(post.status);
    popup.classList.add('visible');
    Luna.calMovePopup(evt);
  },
  calMovePopup: function(evt) {
    var popup = $('calPopup');
    var x = evt.clientX + 16;
    var y = evt.clientY + 12;
    // Keep popup within viewport
    var w = window.innerWidth;
    var h = window.innerHeight;
    if (x + 330 > w) x = evt.clientX - 336;
    if (y + 300 > h) y = h - 310;
    popup.style.left = x + 'px';
    popup.style.top = y + 'px';
  },
  calHidePopup: function() {
    $('calPopup').classList.remove('visible');
  }
};

/* ── INIT ── */
initTheme();
initLogin();
initTabs();

})();
</script>
