<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Marketing - API Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0B1D3A; color: #F8FAFB; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 6px; }
        .subtitle { color: #94A3B8; font-size: 13px; margin-bottom: 30px; }
        .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #94A3B8; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: #F8FAFB; font-size: 14px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #00B4B6; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .checkbox-row input { width: auto; margin: 0; }
        .checkbox-row label { margin: 0; color: #CBD5E1; }
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: linear-gradient(135deg, #00B4B6, #009A9C); color: #F8FAFB; font-size: 15px; font-weight: 600; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: wait; }
        .status { margin-top: 16px; padding: 14px; border-radius: 10px; font-size: 13px; line-height: 1.6; display: none; }
        .status.info { display: block; background: rgba(0,180,182,0.1); border: 1px solid rgba(0,180,182,0.25); color: #00D4D6; }
        .status.error { display: block; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #FCA5A5; }
        .status.success { display: block; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #6EE7B7; }
        .results { margin-top: 20px; display: none; }
        .results.visible { display: block; }
        .post-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
        .post-image-row { display: flex; gap: 6px; padding: 14px 14px 0 14px; overflow-x: auto; }
        .post-image-row img { width: 120px; height: 80px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; flex-shrink: 0; }
        .post-image-row img:hover { border-color: #00B4B6; }
        .post-image-row img.selected { border-color: #00D4D6; box-shadow: 0 0 12px rgba(0,212,214,0.3); }
        .post-hero { width: 100%; height: 280px; object-fit: cover; display: block; }
        .post-body { padding: 18px; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .post-type { padding: 3px 10px; border-radius: 6px; font-size: 11px; background: rgba(0,180,182,0.1); border: 1px solid rgba(0,180,182,0.25); color: #00B4B6; }
        .post-day { font-size: 12px; color: #94A3B8; }
        .post-caption { font-size: 14px; line-height: 1.7; color: #CBD5E1; white-space: pre-wrap; margin-bottom: 12px; }
        .post-meta { font-size: 11px; color: #94A3B8; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 10px; }
        .post-hashtags { color: #00B4B6; margin-top: 4px; }
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
        .tab { padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: #94A3B8; cursor: pointer; font-size: 12px; }
        .tab.active { border-color: rgba(0,180,182,0.4); background: rgba(0,180,182,0.12); color: #00D4D6; }
        .raw-json { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 16px; font-family: monospace; font-size: 12px; color: #94A3B8; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; margin-top: 12px; display: none; }
        .image-loading { padding: 14px; font-size: 12px; color: #94A3B8; text-align: center; }
        .photographer { font-size: 10px; color: #94A3B8; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Luna Marketing</h1>
        <p class="subtitle">Content Engine API Test</p>

        <div class="card">
            <label>Airtable Client Record ID</label>
            <input type="text" id="clientId" value="reckU3dJPui3OnVBP" placeholder="recXXXXXXXXXXXXXXX">

            <div class="checkbox-row">
                <input type="checkbox" id="dryRun" checked>
                <label for="dryRun">Dry run (generate posts but don't write to Airtable)</label>
            </div>

            <button id="generateBtn" onclick="generate()">Generate This Week's Posts</button>

            <div id="status" class="status"></div>
        </div>

        <div id="results" class="results">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('facebook', this)">Facebook</div>
                <div class="tab" onclick="switchTab('instagram', this)">Instagram</div>
                <div class="tab" onclick="switchTab('linkedin', this)">LinkedIn</div>
                <div class="tab" onclick="switchTab('json', this)">Raw JSON</div>
            </div>

            <div id="postsContainer"></div>
            <div id="rawJson" class="raw-json"></div>
        </div>
    </div>

    <script>
        let postsData = null;
        let postImages = {};
        let selectedImages = {};
        let currentPlatform = 'facebook';

        async function generate() {
            const clientId = document.getElementById('clientId').value.trim();
            const dryRun = document.getElementById('dryRun').checked;
            const btn = document.getElementById('generateBtn');
            const status = document.getElementById('status');

            if (!clientId) {
                status.className = 'status error';
                status.textContent = 'Please enter a client record ID.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Generating posts... (this takes 15-30 seconds)';
            status.className = 'status info';
            status.textContent = 'Calling Claude API via your Vercel endpoint. Reading client profile, generating content...';
            document.getElementById('results').classList.remove('visible');
            postImages = {};
            selectedImages = {};

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId, dryRun })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'API returned an error');
                }

                postsData = data;

                status.className = 'status success';
                let msg = 'Generated ' + data.posts.length + ' posts for ' + data.client + '. Now fetching images from Pexels...';
                if (dryRun) {
                    msg += ' (Dry run — posts not written to Airtable)';
                } else {
                    msg += ' ' + data.queued + ' posts queued in Airtable.';
                }
                status.textContent = msg;

                renderPosts('facebook');
                document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);
                document.getElementById('results').classList.add('visible');

                // Fetch images for each post
                for (let i = 0; i < data.posts.length; i++) {
                    fetchImagesForPost(i, data.posts[i]);
                }

            } catch (err) {
                status.className = 'status error';
                status.textContent = 'Error: ' + err.message;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate This Week\'s Posts';
            }
        }

        async function fetchImagesForPost(index, post) {
            const tags = post.image_tags || [];
            const dest = post.destination || '';

            // Always include the destination in the search to keep images on topic
            var query;
            if (dest && dest !== 'General') {
                query = tags.length > 0 ? dest + ' ' + tags[0] : dest + ' travel holiday';
            } else {
                query = tags.length > 0 ? tags[0] + ' travel holiday' : 'travel holiday beach';
            }

            const orientation = post.image_orientation || 'landscape';

            try {
                const response = await fetch('/api/images?q=' + encodeURIComponent(query) + '&orientation=' + orientation + '&per_page=5');
                const data = await response.json();

                if (data.images && data.images.length > 0) {
                    postImages[index] = data.images;
                    selectedImages[index] = 0;
                    renderPosts(currentPlatform);

                    // Update status
                    const status = document.getElementById('status');
                    const fetchedCount = Object.keys(postImages).length;
                    if (fetchedCount === postsData.posts.length) {
                        status.textContent = status.textContent.replace('Now fetching images from Pexels...', 'Images loaded from Pexels.');
                    }
                }
            } catch (err) {
                console.error('Image fetch error for post ' + index + ':', err);
            }
        }

        function selectImage(postIndex, imageIndex) {
            selectedImages[postIndex] = imageIndex;
            renderPosts(currentPlatform);
        }

        function switchTab(platform, el) {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            el.classList.add('active');
            currentPlatform = platform;

            if (platform === 'json') {
                document.getElementById('postsContainer').style.display = 'none';
                document.getElementById('rawJson').style.display = 'block';
            } else {
                document.getElementById('postsContainer').style.display = 'block';
                document.getElementById('rawJson').style.display = 'none';
                renderPosts(platform);
            }
        }

        function renderPosts(platform) {
            if (!postsData || !postsData.posts) return;
            var container = document.getElementById('postsContainer');
            container.innerHTML = '';

            postsData.posts.forEach(function(post, i) {
                var caption = post['caption_' + platform] || post.caption_facebook || '';
                var hashtags = post['hashtags_' + platform] || post.hashtags_facebook || [];
                var words = caption.split(/\s+/).filter(Boolean).length;
                var images = postImages[i] || null;
                var selIdx = selectedImages[i] || 0;

                var card = document.createElement('div');
                card.className = 'post-card';

                var heroHtml = '';
                var imageRowHtml = '';
                var photographerHtml = '';

                if (images && images.length > 0) {
                    var heroImg = images[selIdx];
                    heroHtml = '<img class="post-hero" src="' + heroImg.src.medium + '" alt="' + (heroImg.description || post.destination) + '">';
                    photographerHtml = '<div class="photographer">Photo by ' + heroImg.photographer + ' via Pexels</div>';

                    if (images.length > 1) {
                        imageRowHtml = '<div class="post-image-row">';
                        images.forEach(function(img, j) {
                            imageRowHtml += '<img src="' + img.src.thumbnail + '" alt="Option ' + (j+1) + '" class="' + (j === selIdx ? 'selected' : '') + '" onclick="selectImage(' + i + ',' + j + ')">';
                        });
                        imageRowHtml += '</div>';
                    }
                } else if (images === null) {
                    heroHtml = '<div class="image-loading">Loading images...</div>';
                }

                card.innerHTML = heroHtml + imageRowHtml +
                    '<div class="post-body">' +
                        '<div class="post-header">' +
                            '<span class="post-type">' + (post.content_type || '') + '</span>' +
                            '<span class="post-day">' + (post.destination || '') + ' &middot; ' + (post.suggested_day || '') + ' ' + (post.suggested_time || '') + '</span>' +
                        '</div>' +
                        '<div class="post-caption">' + caption + '</div>' +
                        '<div class="post-hashtags">' + hashtags.join(' ') + '</div>' +
                        '<div class="post-meta">' +
                            words + ' words &middot; ' + hashtags.length + ' hashtags<br>' +
                            'Image tags: ' + (post.image_tags || []).join(' | ') +
                            photographerHtml +
                        '</div>' +
                    '</div>';

                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
